<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Categories | EduShop</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .categories-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 32px;
            margin-top: 100px;
            margin-bottom: 60px;
        }
        .filter-sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .category-filter-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition-fast);
            cursor: pointer;
        }
        .category-filter-item:hover, .category-filter-item.active {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            color: var(--text-primary);
        }
        .category-filter-item.active {
            font-weight: 700;
        }
        @media (max-width: 992px) {
            .categories-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Header Navigation Placeholder -->
    <div id="main-header"></div>

    <!-- Main Container -->
    <main class="container" style="max-width: 1200px; margin: 0 auto; padding: 0 24px 80px;">
        
        <div id="alertBox" style="display: none; padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-top: 100px; margin-bottom: -70px; text-align: center; z-index: 100;"></div>

        <div class="categories-layout">
            
            <!-- Left Side: Category Filter sidebar -->
            <aside class="filter-sidebar scroll-reveal">
                <div class="glass-panel" style="padding: 24px;">
                    <h3 style="font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border-glass); padding-bottom: 12px;">Categories</h3>
                    
                    <div style="display: flex; flex-direction: column; gap: 8px;" id="sidebarCategoriesList">
                        <!-- Loaded dynamically -->
                        <div style="text-align: center; padding: 20px; color: var(--text-muted);">Loading categories...</div>
                    </div>
                </div>

                <div class="glass-panel" style="padding: 24px;">
                    <h3 style="font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; border-bottom: 1px solid var(--border-glass); padding-bottom: 12px;">Quick Filters</h3>
                    
                    <div class="form-group">
                        <label class="form-label" for="priceSort">Sort by Price</label>
                        <select id="priceSort" class="form-control" style="height: 38px; padding: 0 16px;">
                            <option value="none">Default Listing</option>
                            <option value="low-high">Price: Low to High</option>
                            <option value="high-low">Price: High to Low</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" for="stockFilter">Availability</label>
                        <select id="stockFilter" class="form-control" style="height: 38px; padding: 0 16px;">
                            <option value="all">All Items</option>
                            <option value="instock">In-Stock Only</option>
                        </select>
                    </div>
                </div>
            </aside>

            <!-- Right Side: Catalog & Search Grid -->
            <section class="scroll-reveal" style="display: flex; flex-direction: column; gap: 24px;">
                <!-- Search and Stats Bar -->
                <div class="glass-panel" style="padding: 16px 24px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 16px;">
                    <div style="display: flex; gap: 8px; flex-grow: 1; max-width: 500px;">
                        <input class="form-control" type="text" id="searchInput" placeholder="Search keywords..." style="height: 38px;">
                        <button id="searchBtn" class="btn btn-primary" style="height: 38px; white-space: nowrap; padding: 0 20px;">Search</button>
                    </div>
                    <div style="font-size: 0.85rem; color: var(--text-secondary);" id="catalogSummaryText">
                        Found 0 active campus products.
                    </div>
                </div>

                <!-- Products Grid -->
                <div id="catalogGrid" class="catalog-grid">
                    <!-- Loaded dynamically -->
                    <div style="grid-column: 1 / -1; text-align: center; padding: 80px 0; color: var(--text-secondary);">
                        Catalog loading...
                    </div>
                </div>
            </section>
        </div>

    </main>

    <!-- Shopping Cart Drawer (Preserving original structure and IDs) -->
    <div id="cartDrawer" class="cart-drawer">
        <div class="cart-header">
            <h3 style="font-size: 1.25rem;">Shopping Cart</h3>
            <span id="cartClose" class="modal-close">✕</span>
        </div>

        <div id="cartItems" class="cart-items-container">
            <div style="text-align: center; padding: 50px 0; color: var(--text-muted);">
                Your cart is empty.
            </div>
        </div>

        <div class="cart-footer">
            <div class="cart-total-flex">
                <span>Total:</span>
                <span id="cartTotalValue">$0.00</span>
            </div>
            <button id="checkoutBtn" class="btn btn-success" style="width: 100%; height: 46px;">
                Submit Order for Approval
            </button>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="main-footer"></div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/animations.js"></script>
    <script src="/js/categories.js"></script>
</body>
</html>
