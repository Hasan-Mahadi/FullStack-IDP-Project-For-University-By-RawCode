<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account | EduShop</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Center container and adjust padding for standalone look */
        body.auth-wrapper {
            padding: 40px 20px;
        }
    </style>
</head>
<body class="auth-wrapper">

    <div class="glass-card auth-card" style="max-width: 480px;">
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Register to begin trading on our campus IDP platform</p>

        <div id="alertBox" style="display: none; padding: 12px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 20px; text-align: center;"></div>

        <form id="registerForm">
            <div class="form-group">
                <label class="form-label" for="fullName">Full Name</label>
                <input class="form-control" type="text" id="fullName" placeholder="e.g. John Doe" required autocomplete="name">
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" id="email" placeholder="e.g. john@idpshop.edu" required autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" type="text" id="username" placeholder="e.g. johndoe" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <div class="form-group" style="margin-bottom: 28px;">
                <label class="form-label" for="roleId">Account Role Type</label>
                <select class="form-control" id="roleId" required>
                    <option value="" disabled selected>Select Your Role</option>
                    <option value="3">Customer (Student Buyer)</option>
                    <option value="2">Seller (Merchant Vendor)</option>
                    <option value="4">Service Team (Operations/Logistics)</option>
                </select>
                <span style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px; display: block;">
                    * Admin roles are restricted and can only be activated by current system administrators.
                </span>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; height: 46px;">
                Finalize Registration
            </button>
        </form>

        <p style="text-align: center; margin-top: 24px; font-size: 0.85rem; color: var(--text-secondary);">
            Already registered? <a href="/pages/login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in here</a>
        </p>
    </div>

    <!-- Inject Native AJAX API & redirectional script -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('registerForm');
            const alertBox = document.getElementById('alertBox');

            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                alertBox.style.display = 'none';

                const fullName = document.getElementById('fullName').value.trim();
                const email = document.getElementById('email').value.trim();
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const roleId = document.getElementById('roleId').value;

                try {
                    const data = await API.post('/api/auth/register', { 
                        fullName, 
                        email, 
                        username, 
                        password, 
                        roleId 
                    });
                    
                    if (data.success) {
                        // Success toast
                        alertBox.style.display = 'block';
                        alertBox.style.background = 'rgba(52, 199, 89, 0.1)';
                        alertBox.style.color = 'var(--success)';
                        alertBox.style.border = '1px solid rgba(52, 199, 89, 0.3)';
                        alertBox.innerText = 'Registration successful! Directing to workspace...';

                        // Save session
                        Auth.saveSession(data.token, data.user);

                        // Redirection based on role
                        setTimeout(() => {
                            Auth.redirectDashboard(data.user.roleId);
                        }, 800);
                    }
                } catch (error) {
                    alertBox.style.display = 'block';
                    alertBox.style.background = 'rgba(255, 59, 48, 0.1)';
                    alertBox.style.color = 'var(--danger)';
                    alertBox.style.border = '1px solid rgba(255, 59, 48, 0.3)';
                    alertBox.innerText = error.message || 'Registration failed. Try again.';
                }
            });
        });
    </script>
</body>
</html>
