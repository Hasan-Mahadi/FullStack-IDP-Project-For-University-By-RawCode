<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | EduShop</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Header Navigation Placeholder -->
    <div id="main-header"></div>

    <!-- Alert Box for Toast Notifications -->
    <div id="alertBox" class="glass-card" style="display: none; position: fixed; top: 100px; right: 24px; z-index: 1000; padding: 16px 24px; border-radius: var(--radius-md); box-shadow: var(--shadow-main); max-width: 350px; animation: slideIn 0.3s ease-out;"></div>

    <main class="container" style="max-width: 500px; margin: 0 auto; padding: 120px 24px 80px;">
        
        <div class="glass-panel" style="padding: 40px; border-radius: var(--radius-lg);">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="font-size: 3rem; margin-bottom: 12px;">🔑</div>
                <h1 style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #ffffff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Recover Password</h1>
                <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 6px;">Enter your email to retrieve your access credentials.</p>
            </div>

            <!-- Email Request Form -->
            <form id="forgotPasswordForm" style="display: flex; flex-direction: column; gap: 20px;">
                <div>
                    <label class="form-label" for="recoveryEmail" style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Registered Email Address</label>
                    <input class="form-control" type="email" id="recoveryEmail" placeholder="e.g. student@idpshop.edu" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="requestTokenBtn" style="height: 44px; width: 100%;">
                    Verify Email Address &rarr;
                </button>
            </form>

            <!-- Inline Reset Password Form (hidden by default) -->
            <form id="resetPasswordForm" style="display: none; flex-direction: column; gap: 20px;">
                <div>
                    <label class="form-label" for="newPassword" style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">New Password</label>
                    <input class="form-control" type="password" id="newPassword" placeholder="Minimum 6 characters" required>
                </div>
                <div>
                    <label class="form-label" for="confirmPassword" style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Confirm New Password</label>
                    <input class="form-control" type="password" id="confirmPassword" placeholder="Re-enter new password" required>
                </div>
                
                <button type="submit" class="btn btn-success" id="resetPasswordBtn" style="height: 44px; width: 100%;">
                    Update Password &rarr;
                </button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 0.85rem;">
                <a href="/pages/login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">&larr; Back to Login</a>
            </div>
        </div>

    </main>

    <!-- Footer Placeholder -->
    <div id="main-footer"></div>

    <script src="/js/toast.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/navbar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const forgotForm = document.getElementById('forgotPasswordForm');
            const resetForm = document.getElementById('resetPasswordForm');
            const emailInput = document.getElementById('recoveryEmail');
            const tokenBtn = document.getElementById('requestTokenBtn');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const resetPasswordBtn = document.getElementById('resetPasswordBtn');
            
            let resetToken = null;

            forgotForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();

                try {
                    tokenBtn.disabled = true;
                    tokenBtn.innerText = 'Verifying Email...';

                    const res = await API.post('/api/auth/forgot-password', { email });

                    if (res.success && res.resetToken) {
                        resetToken = res.resetToken;
                        triggerToast('Email verified successfully! Please enter your new password.', true);
                        forgotForm.style.display = 'none';
                        resetForm.style.display = 'flex';
                    } else {
                        triggerToast('No account exists with that email address.', false);
                    }
                } catch (error) {
                    triggerToast(error.message || 'Verification request failed.', false);
                } finally {
                    tokenBtn.disabled = false;
                    tokenBtn.innerText = 'Verify Email Address →';
                }
            });

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (newPassword.length < 6) {
                    triggerToast('Password must be at least 6 characters.', false);
                    return;
                }
                if (newPassword !== confirmPassword) {
                    triggerToast('Passwords do not match.', false);
                    return;
                }

                try {
                    resetPasswordBtn.disabled = true;
                    resetPasswordBtn.innerText = 'Updating Password...';

                    const res = await API.post('/api/auth/reset-password', {
                        token: resetToken,
                        newPassword,
                        confirmPassword
                    });

                    if (res.success) {
                        triggerToast('Password successfully reset! Redirecting to login...', true);
                        resetForm.style.display = 'none';
                        setTimeout(() => {
                            window.location.href = '/pages/login.html';
                        }, 2500);
                    }
                } catch (error) {
                    triggerToast(error.message || 'Password update failed.', false);
                } finally {
                    resetPasswordBtn.disabled = false;
                    resetPasswordBtn.innerText = 'Update Password →';
                }
            });

            function triggerToast(message, isSuccess = true) {
                const alertBox = document.getElementById('alertBox');
                alertBox.style.display = 'block';
                alertBox.style.background = isSuccess ? 'rgba(16, 185, 129, 0.15)' : 'rgba(239, 68, 68, 0.15)';
                alertBox.style.color = isSuccess ? 'var(--success)' : 'var(--danger)';
                alertBox.style.border = isSuccess ? '1px solid rgba(16, 185, 129, 0.3)' : '1px solid rgba(239, 68, 68, 0.3)';
                alertBox.innerText = message;

                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 4000);
            }
        });
    </script>
</body>
</html>
