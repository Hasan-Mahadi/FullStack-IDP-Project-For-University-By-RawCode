<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EduShop</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Header Navigation Placeholder -->
    <div id="main-header"></div>

    <!-- Alert Box for Toast Notifications -->
    <div id="alertBox" class="glass-card" style="display: none; position: fixed; top: 100px; right: 24px; z-index: 1000; padding: 16px 24px; border-radius: var(--radius-md); box-shadow: var(--shadow-main); max-width: 350px; animation: slideIn 0.3s ease-out;"></div>

    <main class="container" style="max-width: 500px; margin: 0 auto; padding: 120px 24px 80px;">
        
        <div class="glass-panel" style="padding: 40px; border-radius: var(--radius-lg);">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="font-size: 3rem; margin-bottom: 12px;">🔒</div>
                <h1 style="font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #ffffff, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Reset Password</h1>
                <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 6px;">Enter your token and set a new password.</p>
            </div>

            <!-- Password Reset Form -->
            <form id="resetPasswordForm" style="display: flex; flex-direction: column; gap: 20px;">
                <div>
                    <label class="form-label" for="resetToken" style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Recovery Token</label>
                    <input class="form-control" type="text" id="resetToken" placeholder="Enter security token" required>
                </div>
                <div>
                    <label class="form-label" for="newPassword" style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">New Password</label>
                    <input class="form-control" type="password" id="newPassword" placeholder="Min. 6 characters" required>
                </div>
                <div>
                    <label class="form-label" for="confirmPassword" style="display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);">Confirm New Password</label>
                    <input class="form-control" type="password" id="confirmPassword" placeholder="Repeat new password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" id="resetSubmitBtn" style="height: 44px; width: 100%;">
                    Save New Password
                </button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 0.85rem;">
                <a href="/pages/login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">&larr; Back to Login</a>
            </div>
        </div>

    </main>

    <!-- Footer Placeholder -->
    <div id="main-footer"></div>

    <script src="/js/toast.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/navbar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('resetPasswordForm');
            const tokenInput = document.getElementById('resetToken');
            const passwordInput = document.getElementById('newPassword');
            const confirmInput = document.getElementById('confirmPassword');
            const submitBtn = document.getElementById('resetSubmitBtn');

            // Auto-populate token from URL query
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            if (token) {
                tokenInput.value = token;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const resetTokenVal = tokenInput.value.trim();
                const newPassword = passwordInput.value;
                const confirmPassword = confirmInput.value;

                if (newPassword.length < 6) {
                    triggerToast('Password must be at least 6 characters.', false);
                    return;
                }

                if (newPassword !== confirmPassword) {
                    triggerToast('Passwords do not match.', false);
                    return;
                }

                try {
                    submitBtn.disabled = true;
                    submitBtn.innerText = 'Updating password...';

                    const res = await API.post('/api/auth/reset-password', {
                        token: resetTokenVal,
                        newPassword,
                        confirmPassword
                    });

                    if (res.success) {
                        triggerToast('Password updated successfully! Redirecting to login...', true);
                        setTimeout(() => {
                            window.location.href = '/pages/login.html';
                        }, 2000);
                    }
                } catch (error) {
                    triggerToast(error.message || 'Failed to reset password.', false);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Save New Password';
                }
            });

            function triggerToast(message, isSuccess = true) {
                const alertBox = document.getElementById('alertBox');
                alertBox.style.display = 'block';
                alertBox.style.background = isSuccess ? 'rgba(16, 185, 129, 0.15)' : 'rgba(239, 68, 68, 0.15)';
                alertBox.style.color = isSuccess ? 'var(--success)' : 'var(--danger)';
                alertBox.style.border = isSuccess ? '1px solid rgba(16, 185, 129, 0.3)' : '1px solid rgba(239, 68, 68, 0.3)';
                alertBox.innerText = message;

                setTimeout(() => {
                    alertBox.style.display = 'none';
                }, 4000);
            }
        });
    </script>
</body>
</html>
